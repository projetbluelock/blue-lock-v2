<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Projet Blue Lock v2 - Panel d'entraînement</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="app-header">
    <div class="logo-circle">PB</div>
    <div class="title-block">
      <h1>Projet Blue Lock</h1>
      <p>Assistant d'entraînement solo pour latéral gauche sur 6 mois.</p>
    </div>
  </header>

  <main class="app-main">
    <section class="config-card">
      <h2>Configuration de la semaine</h2>
      <div class="config-row">
        <label for="phase-select">Phase :</label>
        <select id="phase-select">
          <option value="base">Phase 1 · Bases (semaines 1 à 8)</option>
          <option value="intensif">Phase 2 · Intensif (semaines 1 à 8)</option>
          <option value="match">Phase 3 · Match player (semaines 1 à 8)</option>
        </select>
      </div>
      <div class="config-row">
        <label for="week-input">Semaine dans la phase (1–8) :</label>
        <input type="number" id="week-input" min="1" max="8" value="1">
      </div>
      <button id="generate-btn" class="primary-btn">Générer la semaine</button>
    </section>

    <section class="summary-card" id="phase-summary"></section>

    <section class="sessions-grid" id="sessions"></section>
  </main>

  <footer class="app-footer">
    <p>Projet Blue Lock v2 · Hébergeable sur GitHub Pages · Optimisé pour mobile.</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
